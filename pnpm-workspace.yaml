packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^7.0.0
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: ^4.1.9
  vite-plus: latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  protobufjs: false
  yarn: false
patchedDependencies:
  eslint-plugin-sonarjs@4.1.0: patches/eslint-plugin-sonarjs@4.1.0.patch
