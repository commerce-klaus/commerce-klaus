packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^7.0.0
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: ^4.1.9
  vite-plus: latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
minimumReleaseAgeExclude:
  - "@salesforce/b2c-cli@1.18.0"
  - "@salesforce/b2c-tooling-sdk@1.18.0"
allowBuilds:
  protobufjs: false
  yarn: false
