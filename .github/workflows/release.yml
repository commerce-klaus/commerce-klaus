name: Release Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: vp run version-packages
          publish: vp run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: "*"
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_LOGLEVEL: verbose

      - name: Create missing package tags
        id: package_tags
        if: success() && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          created_tags_file=$(mktemp)

          for file in packages/*/package.json; do
            name=$(node -p "const p=require('./${file}'); p.private ? '' : p.name")
            version=$(node -p "const p=require('./${file}'); p.private ? '' : p.version")

            if [ -z "$name" ] || [ -z "$version" ]; then
              continue
            fi

            tag="$name@$version"

            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              echo "Tag already exists: $tag"
              continue
            fi

            git tag "$tag"
            echo "$tag" >> "$created_tags_file"
            echo "Created tag: $tag"
          done

          if [ -s "$created_tags_file" ]; then
            git push --tags
          fi

          {
            echo 'created_tags<<EOF'
            cat "$created_tags_file"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Release diagnostics
        if: always()
        run: |
          set -euo pipefail
          echo "changesets.outputs.published=${{ steps.changesets.outputs.published }}"
          echo "changesets.outputs.publishedPackages=${{ steps.changesets.outputs.publishedPackages }}"
          echo "package_tags.outputs.created_tags=${{ steps.package_tags.outputs.created_tags }}"
          echo "Tags on HEAD:"
          git tag --points-at HEAD || true

      - name: Create GitHub Releases from new tags
        if: steps.package_tags.outputs.created_tags != ''
        env:
          CREATED_TAGS: ${{ steps.package_tags.outputs.created_tags }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          created=0
          while IFS= read -r tag; do
            if [ -z "$tag" ]; then
              continue
            fi
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Release already exists for $tag"
              continue
            fi
            gh release create "$tag" --generate-notes
            echo "Created release for $tag"
            created=$((created + 1))
          done <<< "$CREATED_TAGS"
          echo "Created $created release(s)."
