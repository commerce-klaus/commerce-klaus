name: Release Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: vp run version-packages
          publish: vp run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: "*"
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_LOGLEVEL: verbose

      - name: Determine release candidate tags
        id: release_candidates
        if: success() && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          release_tags_file=$(mktemp)
          target_sha=$(git rev-parse HEAD)
          git fetch --tags --force origin
          changed_files=$(git diff --name-only HEAD^ HEAD -- 'packages/*/package.json' || true)

          if [ -z "$changed_files" ]; then
            echo "No package version changes detected in this commit."
          fi

          for file in $changed_files; do
            name=$(node -p "const p=require('./${file}'); p.private ? '' : p.name")
            version=$(node -p "const p=require('./${file}'); p.private ? '' : p.version")
            previous_version=$(git show "HEAD^:${file}" 2>/dev/null | node -e 'const fs = require("fs"); const input = fs.readFileSync(0, "utf8"); const p = JSON.parse(input); process.stdout.write(p.version || "")' || true)

            if [ -z "$name" ] || [ -z "$version" ]; then
              continue
            fi

            if [ "$version" = "$previous_version" ]; then
              echo "No version bump in $file ($version), skipping"
              continue
            fi

            tag="$name@$version"
            echo "$tag" >> "$release_tags_file"
            echo "Release candidate: $tag ($previous_version -> $version)"

            remote_tag_sha=$(git ls-remote --tags --refs origin "refs/tags/$tag" | awk '{print $1}')
            if [ -n "$remote_tag_sha" ]; then
              if [ "$remote_tag_sha" = "$target_sha" ]; then
                echo "Tag already exists on origin and points to HEAD: $tag"
                continue
              fi

              echo "Retargeting tag to current main commit: $tag ($remote_tag_sha -> $target_sha)"
              git tag -f "$tag" "$target_sha" >/dev/null
              git push --force origin "refs/tags/$tag"
              continue
            fi

            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              git tag -d "$tag" >/dev/null
            fi

            git tag "$tag"
            echo "Created local tag: $tag"
            if git push origin "refs/tags/$tag"; then
              echo "Pushed tag: $tag"
            elif [ -n "$(git ls-remote --tags --refs origin "refs/tags/$tag")" ]; then
              echo "Tag appeared on origin during push, skipping: $tag"
            else
              echo "Failed to push tag: $tag"
              exit 1
            fi
          done

          {
            echo 'release_tags<<EOF'
            sort -u "$release_tags_file"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Release diagnostics
        if: always()
        run: |
          set -euo pipefail
          echo "changesets.outputs.published=${{ steps.changesets.outputs.published }}"
          echo "changesets.outputs.publishedPackages=${{ steps.changesets.outputs.publishedPackages }}"
          echo "release_candidates.outputs.release_tags=${{ steps.release_candidates.outputs.release_tags }}"
          echo "Tags on HEAD:"
          git tag --points-at HEAD || true

      - name: Create GitHub Releases from new tags
        if: steps.release_candidates.outputs.release_tags != ''
        env:
          RELEASE_TAGS: ${{ steps.release_candidates.outputs.release_tags }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          created=0
          while IFS= read -r tag; do
            if [ -z "$tag" ]; then
              continue
            fi
            package_name="${tag%@*}"
            package_version="${tag##*@}"
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Release already exists for $tag"
              continue
            fi
            package_dir=$(node -p 'const fs = require("fs"); const path = require("path"); const packageName = process.argv[1]; for (const dir of fs.readdirSync("packages")) { const manifestPath = path.join("packages", dir, "package.json"); if (!fs.existsSync(manifestPath)) continue; const manifest = require("./" + manifestPath); if (manifest.name === packageName) { console.log(path.join("packages", dir)); process.exit(0); } } process.exit(1);' "$package_name")
            notes_file=$(mktemp)
            node -e 'const fs = require("fs"); const changelogPath = process.argv[1]; const version = process.argv[2]; const outputPath = process.argv[3]; const changelog = fs.readFileSync(changelogPath, "utf8"); const escapedVersion = version.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); const sectionPattern = new RegExp(`## ${escapedVersion}\\n([\\s\\S]*?)(?=\\n## |$)`); const match = changelog.match(sectionPattern); if (!match) { console.error(`Missing changelog entry for version ${version} in ${changelogPath}`); process.exit(1); } const notes = match[1].trim(); fs.writeFileSync(outputPath, notes ? `${notes}\\n` : "");' "$package_dir/CHANGELOG.md" "$package_version" "$notes_file"
            gh release create "$tag" --title "$tag" --notes-file "$notes_file"
            echo "Created release for $tag"
            created=$((created + 1))
          done <<< "$RELEASE_TAGS"
          echo "Created $created release(s)."
