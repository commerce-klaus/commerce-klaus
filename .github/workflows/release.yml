name: Release Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: vp run version-packages
          publish: vp run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: "*"
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_LOGLEVEL: verbose

      - name: Release diagnostics
        if: always()
        run: |
          set -euo pipefail
          echo "changesets.outputs.published=${{ steps.changesets.outputs.published }}"
          echo "changesets.outputs.publishedPackages=${{ steps.changesets.outputs.publishedPackages }}"
          echo "Tags on HEAD:"
          git tag --points-at HEAD || true
