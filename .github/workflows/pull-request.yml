name: Pull Request CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pr-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true

      - name: Run checks
        run: vp check

      - name: Run tests
        run: vp run -r test

      - name: Run builds
        run: vp run -r build
